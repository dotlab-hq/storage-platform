name: Deploy to Cloudflare Workers (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    environment: production
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
      S3_REGION: ${{ secrets.S3_REGION }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      _GITHUB_CLIENT_ID: ${{ secrets._GITHUB_CLIENT_ID }}
      _GITHUB_CLIENT_SECRET: ${{ secrets._GITHUB_CLIENT_SECRET }}
      STORAGE_PROVIDER_ENCRYPTION_KEY: ${{ secrets.STORAGE_PROVIDER_ENCRYPTION_KEY }}
      SKIP_ENV_VALIDATION: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required CI secrets
        run: |
          required_vars=(
            CLOUDFLARE_API_TOKEN
            CLOUDFLARE_ACCOUNT_ID
            DATABASE_URL
            BETTER_AUTH_URL
            BETTER_AUTH_SECRET
            _GITHUB_CLIENT_ID
            _GITHUB_CLIENT_SECRET
            STORAGE_PROVIDER_ENCRYPTION_KEY
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required secret: ${var_name}" >&2
              exit 1
            fi
          done


      - name: Update env-manager with production variables
        run: |
          curl -X POST \
            "https://env.wpsadi.dev/api/wpsadi/dot-storage/.env" \
            -H "Authorization: Bearer ${{ secrets.ENV_MANAGER_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "data": {
                "DATABASE_URL": "${{ secrets.DATABASE_URL }}",
                "BETTER_AUTH_URL": "${{ secrets.BETTER_AUTH_URL }}",
                "BETTER_AUTH_SECRET": "${{ secrets.BETTER_AUTH_SECRET }}",
                "S3_REGION": "${{ secrets.S3_REGION }}",
                "S3_ENDPOINT": "${{ secrets.S3_ENDPOINT }}",
                "S3_ACCESS_KEY_ID": "${{ secrets.S3_ACCESS_KEY_ID }}",
                "S3_SECRET_ACCESS_KEY": "${{ secrets.S3_SECRET_ACCESS_KEY }}",
                "VERCEL_ORG_ID": "${{ secrets.VERCEL_ORG_ID }}",
                "VERCEL_PROJECT_ID": "${{ secrets.VERCEL_PROJECT_ID }}",
                "VERCEL_TOKEN": "${{ secrets.VERCEL_TOKEN }}",
                "_GITHUB_CLIENT_ID": "${{ secrets._GITHUB_CLIENT_ID }}",
                "_GITHUB_CLIENT_SECRET": "${{ secrets._GITHUB_CLIENT_SECRET }}",
                "STORAGE_PROVIDER_ENCRYPTION_KEY": "${{ secrets.STORAGE_PROVIDER_ENCRYPTION_KEY }}"

              }
            }'
      - name: Build project with pnpm
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        run: pnpm dlx wrangler@4 deploy
