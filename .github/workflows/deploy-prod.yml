name: Deploy to Vercel (Production)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    environment: production
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Update env-manager with production variables
        run: |
          curl -X POST \
            "https://env.wpsadi.dev/api/wpsadi/dot-storage/.env" \
            -H "Authorization: Bearer ${{ secrets.ENV_MANAGER_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "data": {
                "DATABASE_URL": "${{ secrets.DATABASE_URL }}",
                "BETTER_AUTH_URL": "${{ secrets.BETTER_AUTH_URL }}",
                "BETTER_AUTH_SECRET": "${{ secrets.BETTER_AUTH_SECRET }}",
                "S3_REGION": "${{ secrets.S3_REGION }}",
                "S3_ENDPOINT": "${{ secrets.S3_ENDPOINT }}",
                "S3_ACCESS_KEY_ID": "${{ secrets.S3_ACCESS_KEY_ID }}",
                "S3_SECRET_ACCESS_KEY": "${{ secrets.S3_SECRET_ACCESS_KEY }}",
                "VERCEL_ORG_ID": "${{ secrets.VERCEL_ORG_ID }}",
                "VERCEL_PROJECT_ID": "${{ secrets.VERCEL_PROJECT_ID }}",
                "VERCEL_TOKEN": "${{ secrets.VERCEL_TOKEN }}",
                "_GITHUB_CLIENT_ID": "${{ secrets._GITHUB_CLIENT_ID }}",
                "_GITHUB_CLIENT_SECRET": "${{ secrets._GITHUB_CLIENT_SECRET }}"

              }
            }'

      - name: Set environment variables on Vercel
        run: |
          printf '%s' "${{ secrets.DATABASE_URL }}" | vercel env add DATABASE_URL production --token=${{ secrets.VERCEL_TOKEN }} --force
          printf '%s' "${{ secrets.BETTER_AUTH_URL }}" | vercel env add BETTER_AUTH_URL production --token=${{ secrets.VERCEL_TOKEN }} --force
          printf '%s' "${{ secrets.BETTER_AUTH_SECRET }}" | vercel env add BETTER_AUTH_SECRET production --token=${{ secrets.VERCEL_TOKEN }} --force
          printf '%s' "${{ secrets._GITHUB_CLIENT_ID }}" | vercel env add _GITHUB_CLIENT_ID production --token=${{ secrets.VERCEL_TOKEN }} --force
          printf '%s' "${{ secrets._GITHUB_CLIENT_SECRET }}" | vercel env add _GITHUB_CLIENT_SECRET production --token=${{ secrets.VERCEL_TOKEN }} --force
          printf '%s' "${{ secrets.S3_REGION }}" | vercel env add S3_REGION production --token=${{ secrets.VERCEL_TOKEN }} --force
          printf '%s' "${{ secrets.S3_ENDPOINT }}" | vercel env add S3_ENDPOINT production --token=${{ secrets.VERCEL_TOKEN }} --force
          printf '%s' "${{ secrets.S3_ACCESS_KEY_ID }}" | vercel env add S3_ACCESS_KEY_ID production --token=${{ secrets.VERCEL_TOKEN }} --force
          printf '%s' "${{ secrets.S3_SECRET_ACCESS_KEY }}" | vercel env add S3_SECRET_ACCESS_KEY production --token=${{ secrets.VERCEL_TOKEN }} --force

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project with pnpm
        run: pnpm build

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
