name: S3 Compatibility (Playwright)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  s3-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      S3_TEST_ENDPOINT: https://storage.wpsrde.dev
      S3_TEST_REGION: ${{ secrets.S3_REGION }}
      S3_TEST_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_TEST_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      S3_TEST_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      S3_TEST_DUMMY_FILE_PATH: tests/s3/fixtures/dummy-upload.txt
      S3_TEST_ENABLE_MULTIPART: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run S3 compatibility suite
        run: pnpm test:s3:compat

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-s3-report
          path: playwright-report
          if-no-files-found: ignore
